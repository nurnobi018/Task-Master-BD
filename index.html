<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Master BD</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f4ff;
}

.header{
background:linear-gradient(135deg,#6A00FF,#8A2BE2);
padding:20px;
color:#fff;
border-radius:0 0 25px 25px;
}

.profile{
display:flex;
align-items:center;
gap:12px;
}

.profile img{
width:55px;
height:55px;
border-radius:50%;
}

.balance{
background:#fff;
margin-top:20px;
padding:18px;
border-radius:18px;
color:#000;
}

.balance h2{
color:#6A00FF;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#fff;
padding:18px;
border-radius:18px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
margin-top:10px;
font-size:16px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -5px 15px rgba(0,0,0,.08);
}
</style>
</head>

<body>

<div class="header">

<div class="profile">
<img src="https://i.pravatar.cc/150?img=5">
<div>
<h2>Hi, User 👋</h2>
<p>স্বাগতম | Welcome</p>
</div>
</div>

<div class="balance">
<h3>Balance</h3>
<h2>৳ 0.00</h2>
</div>

</div>

<div class="grid">

<div class="card">
<h1>🎁</h1>
<h3>Daily Reward</h3>
</div>

<div class="card">
<h1>📺</h1>
<h3>YouTube Task</h3>
</div>

<div class="card">
<h1>👥</h1>
<h3>Referral</h3>
</div>

<div class="card">
<h1>💸</h1>
<h3>Withdraw</h3>
</div>

<div class="card">
<h1>🏆</h1>
<h3>Leaderboard</h3>
</div>

<div class="card">
<h1>👤</h1>
<h3>Profile</h3>
</div>

</div>

<div class="bottom">
🏠 Home
📋 Tasks
💰 Wallet
👤 Account
</div>

</body>
  </html>
